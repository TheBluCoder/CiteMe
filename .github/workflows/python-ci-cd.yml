name: Python CI/CD

env:
  GPSE_API_KEY: ${{ secrets.GPSE_API_KEY }}
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  CX: ${{ vars.CX }}
  MIXBREAD_API_KEY: ${{ secrets.MIXBREAD_API_KEY }}
  PINECONE_API_KEY: ${{ secrets.PINECONE_API_KEY }}
  AZURE_API_KEY: ${{ secrets.AZURE_API_KEY }}
  GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
  CREDIBILITY_API_URL: ${{ vars.CREDIBILITY_API_URL }}
  SERVERLESS: ${{ vars.SERVERLESS }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Add permissions configuration
permissions:
  pull-requests: write
  issues: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies for mainService
      run: |
        cd backend/mainService
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        
    - name: Install dependencies for metricService
      run: |
        cd backend/metricsService
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-test.txt
        
    - name: Run tests
      run: |
        cd backend/mainService
        python -m pytest
        cd ../metricsService
        python -m pytest
        
    - name: Close failed PR
      if: failure() && github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.pulls.update({
            owner: context.repo.owner,
            repo: context.repo.repo,
            pull_number: context.issue.number,
            state: 'closed'
          });
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: 'This PR was automatically closed because the CI pipeline failed.'
          }); 
